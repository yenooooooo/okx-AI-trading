<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OKX Auto-Trading Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .log-container {
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }
    </style>
</head>

<body class="p-6 h-screen flex flex-col">
    <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
        <div>
            <h1 class="text-3xl font-bold text-blue-400">OKX AI Trading Bot</h1>
            <p class="text-slate-400 text-sm mt-1">절대 방어 리스크 관리 시스템 가동 중</p>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span id="status-ping"
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span id="status-dot" class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                <span id="bot-status-text" class="text-slate-300 font-semibold">Offline</span>
            </div>
            <button id="toggle-bot-btn"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded shadow transition font-semibold"
                onclick="toggleBot()">
                Start Bot
            </button>
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h2 class="text-slate-400 text-sm font-medium mb-2">현재 잔고 (시드: 100,000 원)</h2>
            <div class="text-3xl font-bold text-white mb-1" id="current-balance">0.00 <span
                    class="text-lg text-slate-400">USDT</span></div>
            <div class="text-sm text-green-400" id="balance-krw">≈ 0 원</div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h2 class="text-slate-400 text-sm font-medium mb-2">현재 포지션 (BTC/USDT)</h2>
            <div class="text-3xl font-bold text-slate-500 mb-1" id="current-position">NONE</div>
            <div class="text-sm text-slate-400" id="entry-price">진입가: 0.00 USDT</div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <h2 class="text-slate-400 text-sm font-medium mb-2">방어 시스템 상태</h2>
            <ul class="text-sm space-y-2 mt-3">
                <li class="flex justify-between"><span class="text-slate-400">일일 최대 손실 (-5%)</span> <span
                        class="text-green-400 font-semibold">안전</span></li>
                <li class="flex justify-between"><span class="text-slate-400">하드 스탑로스 (-2%)</span> <span
                        class="text-blue-400 font-semibold">대기중</span></li>
                <li class="flex justify-between"><span class="text-slate-400">트레일링 스탑 (+3%)</span> <span
                        class="text-blue-400 font-semibold">대기중</span></li>
            </ul>
        </div>
    </main>

    <section class="flex-grow bg-[#000000] rounded-xl border border-slate-700 shadow-lg flex flex-col overflow-hidden">
        <div
            class="bg-slate-800 px-4 py-2 border-b border-slate-700 text-sm text-slate-300 font-medium flex justify-between">
            <span>System Terminal Logs</span>
            <button onclick="clearLogs()" class="text-xs text-slate-400 hover:text-white">Clear</button>
        </div>
        <div id="log-container" class="p-4 overflow-y-auto font-mono text-sm space-y-1 log-container h-full">
            <div class="text-slate-500">System initialized. Waiting for connection...</div>
        </div>
    </section>

    <script src="api_client.js"></script>
</body>

</html>
